<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join shared list · MENU2GO</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .code-box {
        font-size: 1.5rem;
        letter-spacing: 0.18em;
        font-weight: 700;
        padding: 14px 18px;
        border-radius: 10px;
        background: var(--card);
        display: inline-block;
        margin: 16px 0;
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 12px 18px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Join shared shopping list</h1>
      <p id="status">Opening the MENU2GO app…</p>
      <div id="codeWrap" hidden>
        <p>Invite code</p>
        <div class="code-box" id="code"></div>
        <p>Open the MENU2GO app and tap <strong>Join with invite code</strong>.</p>
        <a class="btn" id="openApp" href="#">Open app</a>
      </div>
    </main>
    <script>
      (function () {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var code = "";
        var joinIndex = parts.indexOf("join");
        if (joinIndex >= 0 && parts[joinIndex + 1]) {
          code = parts[joinIndex + 1].toUpperCase();
        }
        if (!code) {
          var params = new URLSearchParams(window.location.search);
          code = (params.get("code") || "").toUpperCase();
        }

        var status = document.getElementById("status");
        var codeWrap = document.getElementById("codeWrap");
        var codeEl = document.getElementById("code");
        var openApp = document.getElementById("openApp");

        if (!code) {
          status.textContent = "Invalid invite link.";
          return;
        }

        codeEl.textContent = code;
        var appUrl = "menu2goexpress://join/" + encodeURIComponent(code);
        openApp.href = appUrl;

        window.location.href = appUrl;

        setTimeout(function () {
          status.textContent = "If the app did not open automatically:";
          codeWrap.hidden = false;
        }, 1200);
      })();
    </script>
  </body>
</html>
